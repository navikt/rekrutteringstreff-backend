apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: rekrutteringstreff-api
  namespace: toi
  labels:
    team: toi
spec:
  image: {{ image }}
  port: 8080
  ingresses:
  {{#each ingress as |url|}}
    - {{url}}
  {{/each}}
  liveness:
    path: /isalive
    port: 8080
  readiness:
    path: /isready
    port: 8080
  prometheus:
    enabled: true
    path: /metrics
  replicas:
    min: {{ min_replicas }}
    max: {{ max_replicas }}
  resources:
    limits:
      memory: 2048Mi
    requests:
      cpu: 100m
      memory: 512Mi
  accessPolicy:
    inbound:
      rules:
        - application: rekrutteringsbistand-frontend
        - application: rekrutteringsbistand-frontend2
        - application: rekrutteringstreff-minside-api
    outbound:
      rules:
        - application: rekrutteringsbistand-kandidatsok-api
        - application: rekrutteringsbistand-stilling-api
        - application: rekrutteringsbistand-kandidat-api
          namespace: toi
          cluster: {{ fss_cluster }}
        - application: modiacontextholder
          namespace: personoversikt
        - application: logging
          namespace: nais-system
      external:
        - host: fakedings.intern.dev.nav.no
        - host: {{ kandidat_api_host }}
        - host: {{ openai_azure_host }}
          ports:
            - port: 443
  tokenx:
    enabled: true
  azure:
    application:
      enabled: true
      allowAllUsers: false
      claims:
        extra:
          - NAVident
        groups:
          - id: {{ adGruppeUtvikler }}
          - id: {{ adGruppeArbeidsgiverrettet }}
          - id: {{ adGruppeJobbsokerrettet }}
          - id: {{ adGruppeModiaGenerell }}
          - id: {{ adGruppeModiaOppfolging }}
  kafka:
    pool: {{ kafka_pool }}
  leaderElection: true
  gcp:
    sqlInstances:
      - type: {{ postgres }}
        databases:
          - name: rekrutteringstreff-api
        tier: {{ gcp_db_tier }}
        diskAutoresize: {{ gcp_disk_autoresize }}
  envFrom:
    - secret: openai-toi-rekrutteringstreff
  env:
    - name: REKRUTTERINGSBISTAND_ARBEIDSGIVERRETTET
      value: {{adGruppeArbeidsgiverrettet}}
    - name: REKRUTTERINGSBISTAND_UTVIKLER
      value: {{adGruppeUtvikler}}
    - name: REKRUTTERINGSBISTAND_JOBBSOKERRETTET
      value: {{adGruppeJobbsokerrettet}}
    - name: REKRUTTERINGSBISTAND_MODIA_GENERELL
      value: {{adGruppeModiaGenerell}}
    - name: REKRUTTERINGSBISTAND_MODIA_OPPFOLGING
      value: {{adGruppeModiaOppfolging}}
    - name: KANDIDATSOK_API_URL
      value: {{kandidatsok_api_url}}
    - name: KANDIDATSOK_API_SCOPE
      value: {{kandidatsok_api_scope}}
    - name: STILLING_API_URL
      value: {{stilling_api_url}}
    - name: STILLING_API_SCOPE
      value: {{stilling_api_scope}}
    - name: MODIACONTEXTHOLDER_URL
      value: {{modiacontextholder_url}}
    - name: MODIACONTEXTHOLDER_SCOPE
      value: {{modiacontextholder_scope}}
    - name: KAFKA_RAPID_TOPIC
      value: toi.rapid-1
    - name: KAFKA_CONSUMER_GROUP_ID
      value: {{kafka_consumer_group_id}}
    - name: OPENAI_API_URL
      value: "https://{{openai_azure_host}}/openai/deployments/{{openai_deployment}}/chat/completions?api-version={{openai_api_version}}"
    - name: OPENAI_DEPLOYMENT
      value: {{openai_deployment}}
    - name: KANDIDAT_API_URL
      value: {{kandidat_api_url}}
    - name: KANDIDAT_API_SCOPE
      value: {{kandidat_api_scope}}
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: loki
        - id: elastic
      enabled: true
